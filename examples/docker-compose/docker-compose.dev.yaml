services:
  keypebble:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: keypebble
    command: >
      keypebble serve
      --config /etc/keypebble/config.dev.yaml
      --policy /etc/keypebble/policy.yaml
    ports:
      - "8080:8080"
    volumes:
      - ../../examples:/etc/keypebble:ro
