services:
  keypebble:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: keypebble
    command: >
      keypebble serve
      --config /etc/keypebble/config.local.yaml
      --policy /etc/keypebble/policy.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./certs:/etc/keypebble/certs:ro
      - ./config.local.yaml:/etc/keypebble/config.local.yaml:ro
      - ../../examples/policy.yaml:/etc/keypebble/policy.yaml:ro
    restart: unless-stopped
    networks:
      - keypebble_net

  nginx:
    image: nginx:1.27
    container_name: nginx
    restart: always
    depends_on:
      - keypebble
    ports:
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx_logs:/var/log/nginx
    networks:
      - keypebble_net

  registry:
    image: ghcr.io/distribution/distribution:3.0.0
    container_name: proxy_registry
    restart: always
    depends_on:
      - keypebble
    volumes:
      - ./certs:/certs:ro
      - registry_data:/var/lib/registry
    environment:
      REGISTRY_AUTH: token
      REGISTRY_AUTH_TOKEN_REALM: https://registry.localhost/v2/token
      REGISTRY_AUTH_TOKEN_SERVICE: registry.localhost
      REGISTRY_AUTH_TOKEN_ISSUER: registry.localhost
      REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE: /certs/rootCA.pem
      REGISTRY_LOG_LEVEL: debug
    networks:
      - keypebble_net

networks:
  keypebble_net:
    driver: bridge

volumes:
  registry_data:
